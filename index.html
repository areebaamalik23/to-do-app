<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent: #667eea;
            --success: #48bb78;
            --danger: #f56565;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 50%, #e0c3fc 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(180deg); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow), 0 0 40px rgba(102, 126, 234, 0.15);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-field {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.6);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .add-btn {
            padding: 14px 28px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        .add-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.4);
            padding: 6px;
            border-radius: 14px;
        }

        .filter-tab {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .filter-tab:not(.active):hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent);
        }

        .task-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: taskSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes taskSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .task-checkbox:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
        }

        .task-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .task-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .task-text {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            word-break: break-word;
        }

        .delete-btn {
            background: rgba(245, 101, 101, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: var(--danger);
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 4px 15px rgba(245, 101, 101, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.95rem;
            font-weight: 400;
        }

        .task-count {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .task-count span {
            font-weight: 600;
            color: var(--accent);
        }

        .task-item.removing {
            animation: taskRemove 0.4s forwards;
        }

        @keyframes taskRemove {
            to {
                opacity: 0;
                transform: translateX(50px) scale(0.9);
                height: 0;
                margin: 0;
                padding: 0;
            }
        }

        @media (max-width: 600px) {
            .glass-card {
                padding: 24px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }

            .filter-tabs {
                gap: 4px;
            }

            .filter-tab {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <h1>My Tasks</h1>
                <p>Stay organized, stay productive</p>
            </div>

            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="input-field" 
                    id="taskInput" 
                    placeholder="What needs to be done?"
                    autocomplete="off"
                >
                <button class="add-btn" onclick="addTask()">Add Task</button>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all')">All</button>
                <button class="filter-tab" onclick="setFilter('active')">Active</button>
                <button class="filter-tab" onclick="setFilter('completed')">Completed</button>
            </div>

            <div class="task-list" id="taskList"></div>

            <div class="task-count" id="taskCount"></div>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentFilter = 'all';

        // Initialize app
        function init() {
            loadFromLocalStorage();
            renderTasks();
            
            // Enter key support
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTask();
                }
            });
        }

        // Add a new task
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();

            if (taskText === '') {
                input.style.borderColor = 'var(--danger)';
                setTimeout(() => {
                    input.style.borderColor = 'rgba(102, 126, 234, 0.2)';
                }, 1000);
                return;
            }

            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false
            };

            tasks.unshift(newTask);
            input.value = '';
            saveToLocalStorage();
            renderTasks();
        }

        // Delete a task with animation
        function deleteTask(id) {
            const taskElement = document.querySelector(`[data-task-id="${id}"]`);
            if (taskElement) {
                taskElement.classList.add('removing');
                setTimeout(() => {
                    tasks = tasks.filter(task => task.id !== id);
                    saveToLocalStorage();
                    renderTasks();
                }, 400);
            }
        }

        // Toggle task completion
        function toggleTask(id) {
            const task = tasks.find(task => task.id === id);
            if (task) {
                task.completed = !task.completed;
                saveToLocalStorage();
                renderTasks();
            }
        }

        // Set filter
        function setFilter(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTasks();
        }

        // Get filtered tasks
        function getFilteredTasks() {
            switch (currentFilter) {
                case 'active':
                    return tasks.filter(task => !task.completed);
                case 'completed':
                    return tasks.filter(task => task.completed);
                default:
                    return tasks;
            }
        }

        // Render tasks to DOM
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            const filteredTasks = getFilteredTasks();

            if (filteredTasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>${getEmptyMessage()}</p>
                    </div>
                `;
            } else {
                taskList.innerHTML = filteredTasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}" data-task-id="${task.id}">
                        <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                        <div class="task-text" onclick="toggleTask(${task.id})">${escapeHtml(task.text)}</div>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">❌</button>
                    </div>
                `).join('');
            }

            // Update task count
            const activeTasks = tasks.filter(task => !task.completed).length;
            const totalTasks = tasks.length;
            taskCount.innerHTML = totalTasks > 0 
                ? `<span>${activeTasks}</span> active of <span>${totalTasks}</span> tasks`
                : '';
        }

        // Get empty state message
        function getEmptyMessage() {
            switch (currentFilter) {
                case 'active':
                    return 'No active tasks! Great job! 🎉';
                case 'completed':
                    return 'No completed tasks yet. Keep going! 💪';
                default:
                    return 'No tasks yet. Add one above!';
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Save tasks to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('aesthetic-tasks', JSON.stringify(tasks));
        }

        // Load tasks from localStorage
        function loadFromLocalStorage() {
            const savedTasks = localStorage.getItem('aesthetic-tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
